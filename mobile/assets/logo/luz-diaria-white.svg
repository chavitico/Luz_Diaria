<?xml version="1.0" encoding="UTF-8"?>
<svg width="480" height="160" viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="whiteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!--  ICON (white version)                       -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(0, 0)">
    <!-- Rounded square background (transparent for white version) -->
    <rect x="0" y="0" width="140" height="140" rx="32" ry="32" fill="none"/>

    <!-- Horizon line -->
    <line x1="14" y1="84" x2="126" y2="84" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>

    <!-- Distant light glow -->
    <ellipse cx="70" cy="84" rx="26" ry="14" fill="url(#whiteGlow)" opacity="0.6"/>

    <!-- Light rays -->
    <g opacity="0.55" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round">
      <line x1="70" y1="84" x2="70" y2="56"/>
      <line x1="70" y1="84" x2="88" y2="60"/>
      <line x1="70" y1="84" x2="52" y2="60"/>
      <line x1="70" y1="84" x2="100" y2="68"/>
      <line x1="70" y1="84" x2="40" y2="68"/>
    </g>

    <!-- Core light dot -->
    <circle cx="70" cy="84" r="5" fill="#FFFFFF" filter="url(#softGlow)"/>
    <circle cx="70" cy="84" r="2.5" fill="#FFFFFF"/>

    <!-- Left path edge -->
    <path
      d="M 18 130 C 28 118 42 104 70 84"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4.5"
      stroke-linecap="round"
    />

    <!-- Right path edge -->
    <path
      d="M 122 130 C 112 118 98 104 70 84"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="4.5"
      stroke-linecap="round"
    />

    <!-- Path fill -->
    <path
      d="M 18 130 C 28 118 42 104 70 84 C 98 104 112 118 122 130 Z"
      fill="#FFFFFF"
      opacity="0.12"
    />
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!--  LOGOTYPE (white)                           -->
  <!-- ═══════════════════════════════════════════ -->
  <g transform="translate(160, 0)">
    <text
      x="0"
      y="88"
      font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="52"
      font-weight="600"
      letter-spacing="-1.5"
      fill="#FFFFFF"
    >Luz Diaria</text>

    <text
      x="2"
      y="116"
      font-family="'Inter', 'SF Pro Text', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="18"
      font-weight="400"
      letter-spacing="2.5"
      fill="#FFFFFF"
      opacity="0.75"
    >UN DEVOCIONAL PARA CADA DÍA</text>
  </g>
</svg>
