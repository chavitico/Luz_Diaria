<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — Logotipo blanco (isotipo + texto)
  480×160 — v2: llama espiritual blanca + sendero asimétrico + texto blanco
-->
<svg width="480" height="160" viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="flameWhiteGlow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlowW" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ ICON (white version, transparent bg) ═══ -->
  <g>
    <!-- No background rect — transparent for overlay -->

    <!-- Horizon line -->
    <line x1="12" y1="86" x2="128" y2="86" stroke="#FFFFFF" stroke-width="1" opacity="0.40"/>

    <!-- Outer flame glow halo -->
    <ellipse cx="70" cy="70" rx="20" ry="24" fill="url(#flameWhiteGlow)" fill-opacity="0.30"/>

    <!-- Path fill -->
    <path
      d="M 14 136 C 26 122 42 106 69 86 C 96 106 112 122 124 136 Z"
      fill="#FFFFFF"
      fill-opacity="0.10"
    />

    <!-- Left path edge -->
    <path
      d="M 14 136 C 26 122 42 106 69 86"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      stroke-linecap="round"
      stroke-opacity="0.92"
    />

    <!-- Right path edge -->
    <path
      d="M 124 136 C 112 122 96 106 71 86"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="5"
      stroke-linecap="round"
      stroke-opacity="0.92"
    />

    <!-- Outer flame shape -->
    <path
      d="M 70 86
         C 59 80 53 68 54 57
         C 55 46 61 39 65 31
         C 67 26 69 21 70 17
         C 71 21 73 26 75 31
         C 79 39 84 47 84 58
         C 84 69 78 80 70 86 Z"
      fill="#FFFFFF"
      fill-opacity="0.55"
    />

    <!-- Inner flame core -->
    <path
      d="M 70 84
         C 63 78 59 68 60 58
         C 61 49 65 43 68 36
         C 69 33 70 30 70 28
         C 71 30 72 33 73 36
         C 76 43 79 49 79 58
         C 79 67 76 77 70 84 Z"
      fill="#FFFFFF"
      fill-opacity="0.90"
      filter="url(#softGlowW)"
    />

    <!-- Negative-space cross (vertical) — slightly less opaque than flame -->
    <rect x="69.5" y="32" width="1.5" height="36" rx="0.75" fill="#FFFFFF" fill-opacity="0.22"/>
    <!-- Negative-space cross (horizontal) -->
    <rect x="62" y="52" width="16" height="1.8" rx="0.9" fill="#FFFFFF" fill-opacity="0.20"/>

    <!-- Flame base glow -->
    <ellipse cx="70" cy="86" rx="8" ry="3" fill="#FFFFFF" fill-opacity="0.75"/>

    <!-- Flame tip sparkle -->
    <circle cx="70" cy="20" r="1.8" fill="#FFFFFF" fill-opacity="0.80"/>
  </g>

  <!-- ═══ LOGOTYPE TEXT (white) ═══ -->
  <g transform="translate(158, 0)">
    <text
      x="0"
      y="90"
      font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="52"
      font-weight="600"
      letter-spacing="-1.5"
      fill="#FFFFFF"
    >Luz Diaria</text>

    <text
      x="2"
      y="118"
      font-family="'Inter', 'SF Pro Text', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="18"
      font-weight="400"
      letter-spacing="2.5"
      fill="#FFFFFF"
      opacity="0.72"
    >UN DEVOCIONAL PARA CADA DÍA</text>
  </g>
</svg>
