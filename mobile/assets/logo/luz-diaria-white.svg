<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — Logotipo blanco — v3
  480×160 — Camino + libro abierto + llama (all white) + texto blanco
-->
<svg width="480" height="160" viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="wGlow" cx="50%" cy="55%" r="50%">
