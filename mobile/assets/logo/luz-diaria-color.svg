<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — Logotipo color (isotipo + texto)
  480×160 — v2: llama espiritual + sendero asimétrico + texto
-->
<svg width="480" height="160" viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Icon background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EAF3EE"/>
      <stop offset="100%" stop-color="#F7F4EE"/>
    </linearGradient>

    <!-- Flame gradient -->
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="1"/>
      <stop offset="40%" stop-color="#F5C842" stop-opacity="1"/>
      <stop offset="75%" stop-color="#FFF0A0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.65"/>
    </linearGradient>

    <!-- Flame core -->
    <linearGradient id="flameCoreGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFD84A"/>
      <stop offset="55%" stop-color="#FFFBE0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Outer glow radial -->
    <radialGradient id="flameGlow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#F5D77A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>

    <!-- Path gradient -->
    <linearGradient id="pathGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A7D5E"/>
      <stop offset="100%" stop-color="#7BAE8A"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══ ICON (140×140, at origin) ═══ -->
  <g>
    <!-- Rounded square background -->
    <rect x="0" y="0" width="140" height="140" rx="30" ry="30" fill="url(#bgGradient)"/>

    <!-- Sky atmosphere -->
    <rect x="0" y="0" width="140" height="86" rx="0" fill="#D6EDE0" fill-opacity="0.22"/>

    <!-- Horizon line -->
    <line x1="12" y1="86" x2="128" y2="86" stroke="#C8DDD0" stroke-width="1" opacity="0.6"/>

    <!-- Ground -->
    <path
      d="M 12 86 Q 70 80 128 86 L 128 134 L 12 134 Z"
      fill="#C8E0CE"
      fill-opacity="0.20"
    />

    <!-- Outer flame glow -->
    <ellipse cx="70" cy="72" rx="22" ry="26" fill="url(#flameGlow)" fill-opacity="0.55"/>

    <!-- Path fill -->
    <path
      d="M 14 136 C 26 122 42 106 69 86 C 96 106 112 122 124 136 Z"
      fill="#5A8F6F"
      fill-opacity="0.11"
    />

    <!-- Left path edge — asymmetric start -->
    <path
      d="M 14 136 C 26 122 42 106 69 86"
      fill="none"
      stroke="url(#pathGradient)"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- Right path edge -->
    <path
      d="M 124 136 C 112 122 96 106 71 86"
      fill="none"
      stroke="url(#pathGradient)"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- Outer flame shape -->
    <path
      d="M 70 86
         C 59 80 53 68 54 57
         C 55 46 61 39 65 31
         C 67 26 69 21 70 17
         C 71 21 73 26 75 31
         C 79 39 84 47 84 58
         C 84 69 78 80 70 86 Z"
      fill="url(#flameGrad)"
      fill-opacity="0.72"
    />

    <!-- Inner flame core -->
    <path
      d="M 70 84
         C 63 78 59 68 60 58
         C 61 49 65 43 68 36
         C 69 33 70 30 70 28
         C 71 30 72 33 73 36
         C 76 43 79 49 79 58
         C 79 67 76 77 70 84 Z"
      fill="url(#flameCoreGrad)"
      fill-opacity="0.92"
      filter="url(#softGlow)"
    />

    <!-- Negative-space cross (vertical) -->
    <rect x="69.5" y="32" width="1.5" height="36" rx="0.75" fill="#FFFBE8" fill-opacity="0.60"/>
    <!-- Negative-space cross (horizontal) -->
    <rect x="62" y="52" width="16" height="1.8" rx="0.9" fill="#FFFBE8" fill-opacity="0.55"/>

    <!-- Flame base glow -->
    <ellipse cx="70" cy="86" rx="8" ry="3" fill="#F5D77A" fill-opacity="0.88"/>

    <!-- Flame tip sparkle -->
    <circle cx="70" cy="20" r="1.8" fill="#FFFFFF" fill-opacity="0.85"/>
  </g>

  <!-- ═══ LOGOTYPE TEXT ═══ -->
  <g transform="translate(158, 0)">
    <!-- App name -->
    <text
      x="0"
      y="90"
      font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="52"
      font-weight="600"
      letter-spacing="-1.5"
      fill="#2D4A38"
    >Luz Diaria</text>

    <!-- Tagline -->
    <text
      x="2"
      y="118"
      font-family="'Inter', 'SF Pro Text', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="18"
      font-weight="400"
      letter-spacing="2.5"
      fill="#7BAE8A"
    >UN DEVOCIONAL PARA CADA DÍA</text>
  </g>
</svg>
