<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — Logotipo color — v3
  480×160 — Camino + libro abierto + llama + texto
-->
<svg width="480" height="160" viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F7F2"/>
      <stop offset="100%" stop-color="#F7F4EE"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A7D5E" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#7BAE8A" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A7D5E"/>
      <stop offset="100%" stop-color="#2D5440"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDF8EE"/>
      <stop offset="100%" stop-color="#F0EAD8"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8A020"/>
      <stop offset="45%" stop-color="#F5C842"/>
      <stop offset="80%" stop-color="#FFF0A0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="flameCore" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFD84A"/>
      <stop offset="60%" stop-color="#FFFBE0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#F5D77A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBig" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FFF4C2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFF4C2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ICON (140×140) -->
  <g>
    <rect x="0" y="0" width="140" height="140" rx="28" ry="28" fill="url(#bg)"/>

    <!-- Glow -->
    <ellipse cx="70" cy="52" rx="38" ry="42" fill="url(#glowBig)"/>

    <!-- ROAD -->
    <path d="M 50 138 C 50 130 54 120 58 110 C 61 102 64 97 66 93
             L 74 93 C 76 97 79 102 82 110 C 86 120 90 130 90 138 Z"
      fill="url(#road)" opacity="0.88"/>
    <path d="M 66 93 C 66.5 86 67.5 78 68.5 72 L 71.5 72
             C 72.5 78 73.5 86 74 93 Z"
      fill="url(#road)" opacity="0.62"/>

    <!-- BOOK - Left cover -->
    <path d="M 70 93 C 62 91 50 90 36 92 C 30 93 26 95 24 97
             C 22 99 22 102 24 104 C 26 106 30 108 36 109
             C 50 111 62 110 70 108 Z" fill="url(#book)"/>
    <!-- BOOK - Right cover -->
    <path d="M 70 93 C 78 91 90 90 104 92 C 110 93 114 95 116 97
             C 118 99 118 102 116 104 C 114 106 110 108 104 109
             C 90 111 78 110 70 108 Z" fill="url(#book)"/>
    <!-- Left pages -->
    <path d="M 70 94 C 63 92 52 92 38 94 C 32 95 28 97 27 99
             C 26 101 27 103 29 105 C 31 106.5 36 107.5 42 108
             C 53 109 63 109 70 107 Z" fill="url(#pages)"/>
    <!-- Right pages -->
    <path d="M 70 94 C 77 92 88 92 102 94 C 108 95 112 97 113 99
             C 114 101 113 103 111 105 C 109 106.5 104 107.5 98 108
             C 87 109 77 109 70 107 Z" fill="url(#pages)"/>

    <!-- Page lines left -->
    <g opacity="0.17" stroke="#4A7D5E" stroke-width="0.7" stroke-linecap="round">
      <line x1="38" y1="97" x2="67" y2="96"/>
      <line x1="35" y1="100" x2="67" y2="99"/>
      <line x1="35" y1="103" x2="67" y2="102"/>
      <line x1="36" y1="106" x2="67" y2="105"/>
    </g>
    <!-- Page lines right -->
    <g opacity="0.17" stroke="#4A7D5E" stroke-width="0.7" stroke-linecap="round">
      <line x1="73" y1="96" x2="102" y2="97"/>
      <line x1="73" y1="99" x2="105" y2="100"/>
      <line x1="73" y1="102" x2="105" y2="103"/>
      <line x1="73" y1="105" x2="104" y2="106"/>
    </g>

    <!-- Spine -->
    <path d="M 68.5 93 C 69 107 69 108 70 108 C 71 108 71 107 71.5 93 Z"
      fill="#2D5440" opacity="0.55"/>

    <!-- Golden glow -->
    <ellipse cx="70" cy="56" rx="20" ry="22" fill="url(#glow)"/>

    <!-- FLAME outer -->
    <path d="M 70 72 C 62 68 56 60 57 50 C 58 42 63 36 66 29
             C 67.5 25 69 21 70 18 C 71 21 72.5 25 74 29
             C 77 36 82 42 83 50 C 84 60 78 68 70 72 Z"
      fill="url(#flame)" opacity="0.75"/>
    <!-- FLAME core -->
    <path d="M 70 70 C 64 66 60 58 61 50 C 62 43 65.5 38 68 32
             C 69 29 70 26 70 24 C 71 26 72 29 72 32
             C 74.5 38 78 43 79 50 C 80 58 76 66 70 70 Z"
      fill="url(#flameCore)" opacity="0.9"/>

    <!-- Cross negative space -->
    <rect x="69.4" y="28" width="1.2" height="32" rx="0.6" fill="#FFFBE8" opacity="0.55"/>
    <rect x="63" y="46" width="14" height="1.5" rx="0.75" fill="#FFFBE8" opacity="0.50"/>

    <!-- Flame base glow -->
    <ellipse cx="70" cy="72" rx="7" ry="2.5" fill="#F5D77A" opacity="0.85"/>

    <!-- Rays -->
    <g opacity="0.32" stroke="#F5D77A" stroke-width="0.8" stroke-linecap="round">
      <line x1="70" y1="17" x2="70" y2="13"/>
      <line x1="60" y1="28" x2="57" y2="25"/>
      <line x1="80" y1="28" x2="83" y2="25"/>
    </g>

    <circle cx="70" cy="20" r="1.5" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- LOGOTYPE TEXT -->
  <g transform="translate(158, 0)">
    <text
      x="0" y="90"
      font-family="'Inter', 'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="52" font-weight="600" letter-spacing="-1.5"
      fill="#2D4A38"
    >Luz Diaria</text>
    <text
      x="2" y="118"
      font-family="'Inter', 'SF Pro Text', -apple-system, 'Helvetica Neue', Arial, sans-serif"
      font-size="18" font-weight="400" letter-spacing="2.5"
      fill="#7BAE8A"
    >UN DEVOCIONAL PARA CADA DÍA</text>
  </g>
</svg>
