<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — App Icon (solo isotipo) — v3
  1024×1024 — Camino + libro abierto + llama con cruz sutil
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0F7F2"/>
      <stop offset="100%" stop-color="#F7F4EE"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A7D5E" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#5A9070" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7BAE8A" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A7D5E"/>
      <stop offset="100%" stop-color="#2D5440"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDF8EE"/>
      <stop offset="100%" stop-color="#F0EAD8"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="1"/>
      <stop offset="45%" stop-color="#F5C842" stop-opacity="1"/>
      <stop offset="80%" stop-color="#FFF0A0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="flameCore" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFD84A"/>
      <stop offset="60%" stop-color="#FFFBE0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#F5D77A" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#F5C842" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBig" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FFF4C2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFF4C2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1024" height="1024" rx="205" ry="205" fill="url(#bg)"/>

  <!-- BIG GLOW behind flame -->
  <ellipse cx="512" cy="380" rx="278" ry="308" fill="url(#glowBig)"/>

  <!-- ═══ ROAD / CAMINO ═══
       Starts wide at bottom, narrows toward book spine.
       Perspective convergence.
  ═══ -->
  <path
    d="M 366 1008
       C 366 950 394 878 424 806
       C 446 748 468 710 482 680
       L 542 680
       C 556 710 578 748 600 806
       C 630 878 658 950 658 1008
       Z"
    fill="url(#road)"
    opacity="0.88"
  />
  <!-- Center highlight strip -->
  <path
    d="M 497 1008 C 497 950 504 862 512 768 C 520 862 527 950 527 1008 Z"
    fill="#FFFFFF"
    opacity="0.12"
  />
  <!-- Upper road segment — book to flame base -->
  <path
    d="M 482 680 C 484 628 492 570 499 526 L 525 526 C 532 570 540 628 542 680 Z"
    fill="url(#road)"
    opacity="0.62"
  />

  <!-- ═══ OPEN BOOK ═══
       Center at x=512, y≈630-806.
       Wings open left and right.
  ═══ -->

  <!-- Left cover (green) -->
  <path
    d="M 512 680
       C 454 665 366 658 264 672
       C 220 678 192 694 176 710
       C 162 724 162 744 176 758
       C 192 772 220 786 264 792
       C 366 806 454 800 512 785
       Z"
    fill="url(#book)"
  />

  <!-- Right cover (green) -->
  <path
    d="M 512 680
       C 570 665 658 658 760 672
       C 804 678 832 694 848 710
       C 862 724 862 744 848 758
       C 832 772 804 786 760 792
       C 658 806 570 800 512 785
       Z"
    fill="url(#book)"
  />

  <!-- Left pages (cream) -->
  <path
    d="M 512 685
       C 460 672 378 670 278 684
       C 234 690 206 706 200 720
       C 194 734 200 750 212 762
       C 226 772 252 780 306 786
       C 388 796 460 796 512 781
       Z"
    fill="url(#pages)"
  />

  <!-- Right pages (cream) -->
  <path
    d="M 512 685
       C 564 672 646 670 746 684
       C 790 690 818 706 824 720
       C 830 734 824 750 812 762
       C 798 772 772 780 718 786
       C 636 796 564 796 512 781
       Z"
    fill="url(#pages)"
  />

  <!-- Page lines left (subtle) -->
  <g opacity="0.16" stroke="#4A7D5E" stroke-width="4" stroke-linecap="round">
    <line x1="278" y1="706" x2="494" y2="700"/>
    <line x1="258" y1="726" x2="492" y2="720"/>
    <line x1="256" y1="746" x2="492" y2="740"/>
    <line x1="260" y1="766" x2="492" y2="760"/>
    <line x1="266" y1="784" x2="492" y2="778"/>
  </g>

  <!-- Page lines right (subtle) -->
  <g opacity="0.16" stroke="#4A7D5E" stroke-width="4" stroke-linecap="round">
    <line x1="530" y1="700" x2="746" y2="706"/>
    <line x1="532" y1="720" x2="766" y2="726"/>
    <line x1="532" y1="740" x2="768" y2="746"/>
    <line x1="532" y1="760" x2="764" y2="766"/>
    <line x1="532" y1="778" x2="758" y2="784"/>
  </g>

  <!-- Book spine -->
  <path
    d="M 500 680 C 504 782 506 790 512 790 C 518 790 520 782 524 680 Z"
    fill="#2D5440"
    opacity="0.55"
  />

  <!-- ═══ GOLDEN GLOW ═══ -->
  <ellipse cx="512" cy="412" rx="146" ry="160" fill="url(#glow)"/>

  <!-- ═══ FLAME ═══
       Base y=526, tip y=148.
  ═══ -->

  <!-- Outer flame -->
  <path
    d="M 512 526
       C 454 496 410 438 418 366
       C 424 308 462 264 482 214
       C 494 184 504 156 508 132
       C 510 114 514 100 516 124
       C 520 158 530 188 550 214
       C 566 264 606 308 612 366
       C 618 438 576 496 512 526 Z"
    fill="url(#flame)"
    opacity="0.77"
  />

  <!-- Inner flame core -->
  <path
    d="M 512 518
       C 468 490 438 434 444 368
       C 450 308 476 270 492 230
       C 500 210 508 190 510 174
       C 512 190 520 210 528 230
       C 544 270 570 308 576 368
       C 582 434 554 490 512 518 Z"
    fill="url(#flameCore)"
    opacity="0.92"
  />

  <!-- SUBTLE CROSS (negative space) -->
  <!-- Vertical -->
  <rect x="508" y="186" width="8" height="234" rx="4" fill="#FFFBE8" opacity="0.52"/>
  <!-- Horizontal -->
  <rect x="462" y="336" width="100" height="10" rx="5" fill="#FFFBE8" opacity="0.48"/>

  <!-- Flame base glow -->
  <ellipse cx="512" cy="526" rx="52" ry="18" fill="#F5D77A" opacity="0.82"/>

  <!-- Light rays around flame tip -->
  <g opacity="0.32" stroke="#F5D77A" stroke-width="5" stroke-linecap="round">
    <line x1="512" y1="124" x2="512" y2="96"/>
    <line x1="440" y1="204" x2="418" y2="183"/>
    <line x1="584" y1="204" x2="606" y2="183"/>
    <line x1="410" y1="330" x2="382" y2="320"/>
    <line x1="614" y1="330" x2="642" y2="320"/>
  </g>

  <!-- Flame tip sparkle -->
  <circle cx="512" cy="140" r="10" fill="#FFFFFF" opacity="0.88"/>
  <circle cx="511" cy="136" r="5" fill="#FFFFFF" opacity="0.75"/>

</svg>
