<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — App Icon (solo isotipo)
  1024×1024 — apto para App Store icon
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient — amanecer suave -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5EC"/>
      <stop offset="55%" stop-color="#F2EFE6"/>
      <stop offset="100%" stop-color="#EDE3CC"/>
    </linearGradient>

    <!-- Sky layer -->
    <linearGradient id="skyLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D6EDE0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F2EFE6" stop-opacity="0"/>
    </linearGradient>

    <!-- Golden light burst radial -->
    <radialGradient id="goldenBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4C2" stop-opacity="1"/>
      <stop offset="25%" stop-color="#F5D77A" stop-opacity="1"/>
      <stop offset="60%" stop-color="#E8B84B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>

    <!-- Path gradient -->
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A7D5E"/>
      <stop offset="100%" stop-color="#6EA87E"/>
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8E0CE"/>
      <stop offset="100%" stop-color="#B8D4BD"/>
    </linearGradient>

    <!-- Soft glow filter for the core light -->
    <filter id="coreGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ray glow filter -->
    <filter id="rayGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Path edge glow -->
    <filter id="pathGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════ BACKGROUND ═══════════════ -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgMain)"/>
  <!-- Sky atmosphere -->
  <rect width="1024" height="620" rx="0" fill="url(#skyLayer)"/>

  <!-- ═══════════════ HORIZON LINE ═══════════════ -->
  <!-- Subtle horizon -->
  <line x1="80" y1="590" x2="944" y2="590" stroke="#C8DDD0" stroke-width="2" opacity="0.8"/>

  <!-- Ground / earth area below horizon -->
  <path
    d="M 80 590 Q 240 575 512 590 Q 784 605 944 590 L 944 920 Q 512 900 80 920 Z"
    fill="url(#groundGrad)"
    opacity="0.30"
  />

  <!-- ═══════════════ GOLDEN LIGHT (horizon) ═══════════════ -->
  <!-- Outer halo -->
  <ellipse cx="512" cy="590" rx="240" ry="120" fill="url(#goldenBurst)" opacity="0.55"/>
  <!-- Inner halo -->
  <ellipse cx="512" cy="590" rx="110" ry="55" fill="#F5D77A" opacity="0.55"/>

  <!-- ═══════════════ LIGHT RAYS ═══════════════ -->
  <g filter="url(#rayGlow)" opacity="0.38">
    <!-- Center ray up -->
    <line x1="512" y1="590" x2="512" y2="210" stroke="#F0CC5A" stroke-width="3" stroke-linecap="round"/>
    <!-- Left rays -->
    <line x1="512" y1="590" x2="360" y2="240" stroke="#F0CC5A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="512" y1="590" x2="224" y2="310" stroke="#F0CC5A" stroke-width="2" stroke-linecap="round"/>
    <line x1="512" y1="590" x2="140" y2="410" stroke="#F0CC5A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right rays -->
    <line x1="512" y1="590" x2="664" y2="240" stroke="#F0CC5A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="512" y1="590" x2="800" y2="310" stroke="#F0CC5A" stroke-width="2" stroke-linecap="round"/>
    <line x1="512" y1="590" x2="884" y2="410" stroke="#F0CC5A" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ═══════════════ PATH / SENDERO ═══════════════ -->
  <!-- Path fill (between the two curves) -->
  <path
    d="M 110 940
       C 160 880 280 760 512 590
       C 744 760 864 880 914 940
       Z"
    fill="#5A8F6F"
    opacity="0.13"
  />

  <!-- Left path border -->
  <path
    d="M 110 940
       C 160 880 280 760 512 590"
    fill="none"
    stroke="url(#pathGrad)"
    stroke-width="28"
    stroke-linecap="round"
    filter="url(#pathGlow)"
    opacity="0.9"
  />

  <!-- Right path border -->
  <path
    d="M 914 940
       C 864 880 744 760 512 590"
    fill="none"
    stroke="url(#pathGrad)"
    stroke-width="28"
    stroke-linecap="round"
    filter="url(#pathGlow)"
    opacity="0.9"
  />

  <!-- ═══════════════ LIGHT CORE (punto de luz) ═══════════════ -->
  <!-- Outer glow circle -->
  <circle cx="512" cy="590" r="58" fill="#F5D77A" opacity="0.45" filter="url(#coreGlow)"/>
  <!-- Mid circle -->
  <circle cx="512" cy="590" r="26" fill="#F5D77A" opacity="0.95"/>
  <!-- Inner bright dot -->
  <circle cx="512" cy="590" r="11" fill="#FFFBE0"/>
  <!-- Specular highlight -->
  <circle cx="507" cy="584" r="5" fill="#FFFFFF" opacity="0.85"/>
</svg>
