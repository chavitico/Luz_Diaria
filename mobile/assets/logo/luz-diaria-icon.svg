<?xml version="1.0" encoding="UTF-8"?>
<!--
  Luz Diaria — App Icon (solo isotipo)
  1024×1024 — apto para App Store icon
  v2: llama espiritual + sendero asimétrico + cruz por espacio negativo
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient — amanecer suave -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5EC"/>
      <stop offset="50%" stop-color="#F2EFE6"/>
      <stop offset="100%" stop-color="#EDE3CC"/>
    </linearGradient>

    <!-- Sky atmosphere -->
    <linearGradient id="skyLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D6EDE0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F2EFE6" stop-opacity="0"/>
    </linearGradient>

    <!-- Flame golden gradient (base warm, tip bright) -->
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8A020" stop-opacity="1"/>
      <stop offset="35%" stop-color="#F5C842" stop-opacity="1"/>
      <stop offset="70%" stop-color="#FFF0A0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Flame inner core — brighter center -->
    <linearGradient id="flameCoreGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFD84A" stop-opacity="1"/>
      <stop offset="60%" stop-color="#FFFBE0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Outer golden glow radial -->
    <radialGradient id="flameGlow" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#F5D77A" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#E8B84B" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>

    <!-- Path gradient green -->
    <linearGradient id="pathGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A7D5E"/>
      <stop offset="100%" stop-color="#7BAE8A"/>
    </linearGradient>

    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8E0CE"/>
      <stop offset="100%" stop-color="#B8D4BD"/>
    </linearGradient>

    <!-- Core glow filter -->
    <filter id="coreGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Flame glow filter (softer) -->
    <filter id="flameGlowFilter" x="-60%" y="-40%" width="220%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Path glow filter -->
    <filter id="pathGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════ BACKGROUND ═══════════════ -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgMain)"/>
  <rect width="1024" height="640" rx="0" fill="url(#skyLayer)"/>

  <!-- ═══════════════ GROUND ═══════════════ -->
  <!-- Horizon line (very subtle) -->
  <line x1="80" y1="620" x2="944" y2="620" stroke="#C8DDD0" stroke-width="1.5" opacity="0.6"/>
  <!-- Ground fill -->
  <path
    d="M 80 620 Q 260 605 512 620 Q 764 635 944 620 L 944 930 Q 512 912 80 930 Z"
    fill="url(#groundGrad)"
    opacity="0.22"
  />

  <!-- ═══════════════ OUTER GLOW around flame ═══════════════ -->
  <ellipse cx="512" cy="530" rx="210" ry="200" fill="url(#flameGlow)" opacity="0.55"/>

  <!-- ═══════════════ PATH / SENDERO ═══════════════ -->
  <!--
    Path starts clearly at base (bottom edge).
    Slight asymmetry: left curve starts at ~x=105 (more left),
    right starts at ~x=890 (slightly less right) giving human feel.
    Both converge at the flame base ~(512, 620).
  -->

  <!-- Path fill between edges -->
  <path
    d="M 105 960
       C 170 880 300 750 510 620
       C 720 750 840 875 900 960
       Z"
    fill="#5A8F6F"
    opacity="0.11"
  />

  <!-- Left path edge — starts lower-left, slight inward curve -->
  <path
    d="M 105 960
       C 170 880 300 750 510 620"
    fill="none"
    stroke="url(#pathGrad)"
    stroke-width="30"
    stroke-linecap="round"
    filter="url(#pathGlow)"
    opacity="0.92"
  />

  <!-- Right path edge — starts lower-right, slightly different rhythm -->
  <path
    d="M 900 960
       C 840 875 720 750 514 620"
    fill="none"
    stroke="url(#pathGrad)"
    stroke-width="30"
    stroke-linecap="round"
    filter="url(#pathGlow)"
    opacity="0.92"
  />

  <!-- ═══════════════ FLAME SHAPE ═══════════════ -->
  <!--
    Flame: vertical, elongated teardrop / candle flame form.
    Base at ~y=620, tip reaches ~y=260.
    Width ~90 at base, tapers to a fine point.
    Slight rightward lean for organic feel.

    Negative-space cross:
    Achieved by two thin semi-transparent rectangles crossing
    near the upper-middle of the flame (not at tip, not at base).
    They are lighter than the flame fill, creating a suggestion of a cross
    WITHOUT being an explicit cross symbol.
  -->

  <!-- Outer flame (ambient glow layer) -->
  <path
    d="M 512 620
       C 465 590 436 535 440 480
       C 444 425 468 388 488 340
       C 498 316 505 290 508 262
       C 510 248 514 238 516 260
       C 520 292 527 320 540 348
       C 558 388 576 428 578 476
       C 580 528 554 590 512 620 Z"
    fill="url(#flameGrad)"
    opacity="0.35"
    filter="url(#flameGlowFilter)"
  />

  <!-- Mid flame -->
  <path
    d="M 512 618
       C 474 592 452 548 455 500
       C 458 452 476 415 494 372
       C 502 351 508 328 510 305
       C 512 330 518 353 528 375
       C 546 417 562 454 564 502
       C 566 550 546 592 512 618 Z"
    fill="url(#flameGrad)"
    opacity="0.75"
  />

  <!-- Inner bright flame core -->
  <path
    d="M 512 614
       C 487 592 472 556 474 518
       C 476 480 490 450 500 420
       C 506 404 510 386 511 368
       C 513 388 518 406 526 422
       C 537 450 548 480 548 518
       C 548 556 534 592 512 614 Z"
    fill="url(#flameCoreGrad)"
    opacity="0.92"
  />

  <!-- ═══════════════ NEGATIVE-SPACE CROSS (subtle) ═══════════════ -->
  <!--
    Not a literal cross. Two thin, semi-transparent white/light shapes
    that interrupt the flame at the vertical and horizontal axis
    of the upper-middle section (~y=430 to 490, x=498 to 526).
    This creates an implied cross form readable only at second glance.
  -->

  <!-- Vertical gap (vertical bar of the "cross" — a sliver of lighter color through the flame center) -->
  <rect
    x="509" y="350" width="6" height="160"
    rx="3" ry="3"
    fill="#FFFBE8"
    opacity="0.55"
  />

  <!-- Horizontal gap (horizontal bar of the "cross" — wider, shorter) -->
  <rect
    x="482" y="438" width="60" height="7"
    rx="3.5" ry="3.5"
    fill="#FFFBE8"
    opacity="0.50"
  />

  <!-- ═══════════════ FLAME BASE GLOW ═══════════════ -->
  <!-- Small warm glow where flame meets path/ground -->
  <ellipse cx="512" cy="618" rx="64" ry="22" fill="#F5D77A" opacity="0.50" filter="url(#coreGlow)"/>
  <ellipse cx="512" cy="620" rx="28" ry="9" fill="#F5D77A" opacity="0.90"/>

  <!-- ═══════════════ FLAME TIP SPARKLE ═══════════════ -->
  <!-- Tiny bright dot at flame tip -->
  <circle cx="512" cy="292" r="6" fill="#FFFBE0" opacity="0.88"/>
  <circle cx="511" cy="289" r="3" fill="#FFFFFF" opacity="0.80"/>

</svg>
